steps:
  # =========================================================================
  # 1. BUILD & DOCKERIZE CORE EMPLOYEE BACKEND (This Repository)
  # =========================================================================
  - name: 'gcr.io/cloud-builders/mvn'
    args: ['clean', 'package', '-DskipTests']
    dir: 'ems'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/prefab-lamp-498812-u8/ems-repo/ems-backend:latest'
      - '-f'
      - 'ems/Dockerfile'
      - 'ems'

  # =========================================================================
  # 2. CLONE, BUILD & DOCKERIZE DEPARTMENT SERVICE
  # =========================================================================
  - name: 'gcr.io/cloud-builders/git'
    args: ['clone', 'https://github.com/chandbasha304/department-service.git']

  - name: 'gcr.io/cloud-builders/mvn'
    args: ['clean', 'package', '-DskipTests']
    dir: 'department-service'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/prefab-lamp-498812-u8/ems-repo/department-backend:latest'
      - '.'
    dir: 'department-service'

  # =========================================================================
  # 3. CLONE & DOCKERIZE ANGULAR UI (employee-service)
  # =========================================================================
  - name: 'gcr.io/cloud-builders/git'
    args: ['clone', 'https://github.com/chandbasha304/employee-service.git']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/prefab-lamp-498812-u8/ems-repo/ems-frontend:latest'
      - '.'
    dir: 'employee-service'

  # =========================================================================
  # 4. CLONE & DOCKERIZE REACT ANALYTICS UI (react-analytics)
  # =========================================================================
  - name: 'gcr.io/cloud-builders/git'
    args: ['clone', 'https://github.com/chandbasha304/react-analytics.git']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/prefab-lamp-498812-u8/ems-repo/ems-analytics:latest'
      - '.'
    dir: 'react-analytics'

  # =========================================================================
  # 5. PUSH ALL IMAGES TO ARTIFACT REGISTRY
  # =========================================================================
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/prefab-lamp-498812-u8/ems-repo/ems-backend:latest']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/prefab-lamp-498812-u8/ems-repo/department-backend:latest']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/prefab-lamp-498812-u8/ems-repo/ems-frontend:latest']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/prefab-lamp-498812-u8/ems-repo/ems-analytics:latest']

  # =========================================================================
  # 6. TRIGGER REMOTE SSH DEPLOYMENT ON VM
  # =========================================================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud compute ssh bashasoft304@ems-backend-vm \
          --zone=us-central1-a \
          --command="cd ~/ems-deployment && docker-compose pull && docker-compose down && docker-compose up -d"

images:
  - 'us-central1-docker.pkg.dev/prefab-lamp-498812-u8/ems-repo/ems-backend:latest'
  - 'us-central1-docker.pkg.dev/prefab-lamp-498812-u8/ems-repo/department-backend:latest'
  - 'us-central1-docker.pkg.dev/prefab-lamp-498812-u8/ems-repo/ems-frontend:latest'
  - 'us-central1-docker.pkg.dev/prefab-lamp-498812-u8/ems-repo/ems-analytics:latest'

options:
  logging: CLOUD_LOGGING_ONLY
